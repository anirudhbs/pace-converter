<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pace Converter</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">
        Pace Converter
      </h1>
      <table class="w-full border-collapse">
        <thead>
          <tr class="border-b border-gray-200">
            <th class="py-2 px-4 text-left text-gray-600 font-medium">
              Distance
            </th>
            <th class="py-2 px-4 text-left text-gray-600 font-medium">Time</th>
          </tr>
        </thead>
        <tbody id="pace-table">
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">200m</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">400m</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">800m</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">1000m</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">1600m</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">5km</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">10km</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">21.1km</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
          <tr class="border-b border-gray-100">
            <td class="py-2 px-4">42.2km</td>
            <td class="py-2 px-4">
              <input
                type="text"
                class="time-input w-full bg-transparent border-none focus:outline-none"
              />
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
