<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pace Converter</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="min-h-screen">
    <div class="p-4 rounded-lg w-full max-w-xs">
      <table class="w-full border-collapse border border-black">
        <thead>
          <tr class="border border-black">
            <th class="py-2 px-4 text-left text-gray-600 font-medium border border-black">
              Distance
            </th>
            <th class="py-2 px-4 text-left text-gray-600 font-medium border border-black">Time</th>
          </tr>
        </thead>
        <form id="pace-form" class="mb-4">
        <div class="flex gap-2 mb-2">
          <div>
            <label class="block text-sm font-medium">Mins</label>
            <input
              type="number"
              id="minutes-input"
              class="w-20 border border-black px-2 py-1"
            />
          </div>
          <div>
            <label class="block text-sm font-medium">Secs</label>
            <input
              type="number"
              id="seconds-input"
              class="w-20 border border-black px-2 py-1"
            />
          </div>
        </div>
        <button type="submit" class="px-4 py-2 bg-black text-white">Submit</button>
      </form>
      <tbody id="pace-table">
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">200m</td>
            <td id="time-0" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">400m</td>
            <td id="time-1" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">800m</td>
            <td id="time-2" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">1000m</td>
            <td id="time-3" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">1600m</td>
            <td id="time-4" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">5km</td>
            <td id="time-5" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">10km</td>
            <td id="time-6" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">21.1km</td>
            <td id="time-7" class="py-2 px-4 border border-black"></td>
          </tr>
          <tr class="border border-black">
            <td class="py-2 px-4 border border-black">42.2km</td>
            <td id="time-8" class="py-2 px-4 border border-black"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
