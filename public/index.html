<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>Pace Converter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen">
    <div class="p-4 rounded-lg w-full max-w-xs">
      <h1 class="text-xl font-bold mb-4">Pace Converter</h1>
      <form id="pace-form" class="mb-4">
        <div class="flex gap-2 mb-2">
          <div>
            <label class="block text-sm font-medium">Mins</label>
            <input
              type="number"
              id="minutes-input"
              value="4"
              autofocus
              class="w-20 border border-black px-2 py-1"
            />
          </div>
          <div>
            <label class="block text-sm font-medium">Secs</label>
            <input
              type="number"
              id="seconds-input"
              value="15"
              class="w-20 border border-black px-2 py-1"
            />
          </div>
          <div>
            <label class="block text-sm font-medium">Distance</label>
            <select id="distance-select" class="border border-black px-2 py-1">
              <option value="km" selected>km</option>
              <option value="mile">mile</option>
              <option value="5">5 km</option>
              <option value="10">10 km</option>
              <option value="21.1">21.1 km</option>
              <option value="42.2">42.2 km</option>
            </select>
          </div>
        </div>
        <button type="submit" class="px-4 py-2 bg-black text-white">
          Submit
        </button>
      </form>
      <table class="w-full border-collapse">
        <thead>
          <tr class="">
            <th class="py-2 px-4 text-left text-gray-600 font-medium w-20">
              Distance
            </th>
            <th class="py-2 px-4 text-left text-gray-600 font-medium w-20">
              Time
            </th>
          </tr>
        </thead>
        <tbody id="pace-table">
          <tr class="">
            <td class="py-2 px-4 w-20">200 m</td>
            <td id="time-0" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">400 m</td>
            <td id="time-1" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">800 m</td>
            <td id="time-2" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">1 km</td>
            <td id="time-3" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">1 mile</td>
            <td id="time-4" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">5 km</td>
            <td id="time-5" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">10 km</td>
            <td id="time-6" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">21.1 km</td>
            <td id="time-7" class="py-2 px-4 w-20"></td>
          </tr>
          <tr class="">
            <td class="py-2 px-4 w-20">42.2 km</td>
            <td id="time-8" class="py-2 px-4 w-20"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
